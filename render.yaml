# Render 部署配置（Blueprint）
# 文档：https://render.com/docs/blueprint-spec
# 使用方法：在 Render 控制台 New > Blueprint 选择本仓库，会自动识别此文件

services:
  # ===== 后端 Web Service =====
  - type: web
    name: qishen-zhikong
    runtime: python
    region: singapore  # 新加坡区，国内访问较快
    plan: free  # 免费档（512MB 内存，会休眠，首请求冷启动 30s+）
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      # 安装 Chromium 运行所需的系统依赖（free 档无 root，用 apt-get 直接装到用户可写目录）
      # 注意：Render 构建阶段文件系统只读部分目录，但 /usr/lib 可写
      apt-get update || true
      apt-get install -y --no-install-recommends \
        libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
        libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
        libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 \
        fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei || true
      # 下载 Chromium 二进制
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/playwright-browsers playwright install chromium
    startCommand: bash -c 'PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/playwright-browsers uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-keep-alive 30 --log-level info'
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Python 版本：固定 3.11（避免 3.14 过新导致依赖不兼容）
      - key: PYTHON_VERSION
        value: 3.11.11
      # 必填：DeepSeek API Key（未填则自动启用 Mock 模式）
      - key: DEEPSEEK_API_KEY
        sync: false  # 在 Render 控制台手动填写
      # 必填：Supabase 配置
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # 前端域名（PDF 生成时 worker 用它访问报告页）
      - key: FRONTEND_URL
        # 部署后填入前端域名，如 https://qishen-frontend.onrender.com
        sync: false
      # Mock 模式：auto（推荐）
      - key: MOCK_MODE
        value: auto
      # AI 调用超时
      - key: AI_TIMEOUT
        value: "120"
      # Playwright 浏览器路径（与 startCommand 一致）
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/playwright-browsers

  # ===== 前端 Static Site =====
  # 注意：Static Site 是全球 CDN 分发，不支持 region 与 plan 字段（固定免费）
  - type: web
    name: qishen-frontend
    runtime: static
    buildCommand: npm install && npm run build
    # Vite 构建时通过 VITE_API_BASE 注入后端地址
    envVars:
      # 直接写死后端域名（与上方 qishen-zhikong 后端服务名对应）
      # 这样 Render 部署时自动注入，无需在控制台手动设置
      - key: VITE_API_BASE
        value: https://qishen-zhikong.onrender.com
    staticPublishPath: ./dist
    # SPA 路由 fallback：所有路径回退到 index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
